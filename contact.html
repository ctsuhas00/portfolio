<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact CT Suhas</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>

    <nav>

        <h2>CT Suhas</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>

    </nav>

</header>

<section class="section">

    <h2>Let's Connect</h2>

    <p class="contact-text">

        Interested in collaborating,
        discussing projects, internships,
        or innovative ideas?

        Feel free to send me a message.

    </p>

    <form
        class="contact-form"
        action="https://formspree.io/f/mdavabdr"
        method="POST">

        <input
            type="text"
            name="name"
            placeholder="Your Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Your Gmail Address"
            required>

        <input
            type="tel"
            name="phone"
            placeholder="Phone Number"
            required>

        <textarea
            name="message"
            rows="6"
            placeholder="Write your message here..."
            required></textarea>

        <button type="submit">

            Send Message

        </button>

    </form>

</section>

</body>
</html>
