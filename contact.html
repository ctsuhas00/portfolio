<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact C T Suhas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- FIXED NAVBAR -->

<nav class="navbar">

<div class="logo">
C T SUHAS
</div>

<ul>

<li><a href="index.html">Home</a></li>

</ul>

</nav>

<header>

<h1>
CONTACT ME
</h1>

<p class="subtitle">

Let's connect and build something amazing together.

</p>

</header>

<div class="container">

<section class="content-card">

<h2>Send a Message</h2>

<form
action="https://formspree.io/f/mdavabdr"
method="POST"
class="contact-form">

<input
type="text"
name="name"
placeholder="Your Full Name"
required>

<input
type="email"
name="email"
placeholder="Your Email Address"
required>

<input
type="tel"
name="phone"
placeholder="Phone Number"
required>

<textarea
name="message"
rows="8"
placeholder="Write your message here..."
required></textarea>

<button type="submit">

Send Message

</button>

</form>

</section>

</div>

</body>

</html>
