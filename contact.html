<!DOCTYPE html>
<html>
<head>

<title>Contact CT Suhas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">
        CT SUHAS PORTFOLIO
    </div>

    <nav>

        <a href="index.html">
            Home
        </a>

    </nav>

</header>

<section class="content-section">

    <h2>Contact Me</h2>

    <form
        class="contact-form"
        action="https://formspree.io/f/mdavabdr"
        method="POST">

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Your Gmail ID"
            required>

        <input
            type="tel"
            name="phone"
            placeholder="Phone Number"
            required>

        <textarea
            name="message"
            rows="6"
            placeholder="Write your message..."
            required></textarea>

        <button type="submit">

            Send Message

        </button>

    </form>

</section>

</body>
</html>
