<section id="contact" class="section">
    <h2>Let's Connect</h2>

    <p class="contact-text">
        Interested in collaborating, discussing projects, internships,
        or innovative ideas? Feel free to send me a message.
    </p>

    <form
        class="contact-form"
        action="https://formspree.io/f/mdavabdr"
        method="POST">

        <input
            type="text"
            name="name"
            placeholder="Your Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Your Email Address"
            required>

        <input
            type="text"
            name="subject"
            placeholder="Subject"
            required>

        <textarea
            name="message"
            rows="6"
            placeholder="Write your message here..."
            required></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>
</section>
