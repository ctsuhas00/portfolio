<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact CT Suhas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<a href="index.html" class="contact-btn">
    Home
</a>

<header>

    <h1>CONTACT ME</h1>

    <p class="subtitle">
        Let's discuss projects, internships, opportunities,
        or innovative ideas.
    </p>

</header>

<div class="container">

    <section>

        <h2>Send a Message</h2>

        <form
            action="https://formspree.io/f/mdavabdr"
            method="POST"
            class="contact-form">

            <input
                type="text"
                name="name"
                placeholder="Your Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Your Gmail Address"
                required>

            <input
                type="tel"
                name="phone"
                placeholder="Phone Number"
                required>

            <textarea
                name="message"
                rows="8"
                placeholder="Write your message here..."
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </section>

</div>

</body>

</html>
